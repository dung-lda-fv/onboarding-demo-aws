name: CI/CD – Build & Deploy to LocalStack

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  # registry:2 chạy trên máy self-hosted runner (localhost)
  ECR_REGISTRY: localhost:5000
  ECR_REPOSITORY: my-app
  LOCALSTACK_ENDPOINT: http://localhost:4566

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: self-hosted   # ← máy local của bạn

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Xác định image tag = 7 ký tự đầu của commit SHA ───────────────
      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # ── 3. Đảm bảo LocalStack + registry đang chạy ───────────────────────
      - name: Start LocalStack & registry
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          docker compose up -d localstack registry
          echo "Waiting for LocalStack to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "$LOCALSTACK_ENDPOINT/_localstack/health" 2>/dev/null || echo "")
            if echo "$STATUS" | grep -q '"running"'; then
              echo "LocalStack ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 5
          done
          curl -sf "$LOCALSTACK_ENDPOINT/_localstack/health" | python3 -m json.tool

      # ── 4. Build Docker image ─────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build -t "$ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}" ./app

      # ── 5. Push lên local registry (localhost:5000) ───────────────────────
      - name: Push image to local registry
        run: |
          docker tag "$ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}"

          docker tag "$ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      # ── 6. Tạo ECR repo trên LocalStack (metadata) ───────────────────────
      - name: Ensure ECR repository exists on LocalStack
        run: |
          aws --endpoint-url="$LOCALSTACK_ENDPOINT" \
            ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" 2>/dev/null \
          || \
          aws --endpoint-url="$LOCALSTACK_ENDPOINT" \
            ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION"

      # ── 7. Terraform apply – cập nhật ECS task definition ─────────────────
      - name: Terraform Init
        run: |
          docker compose exec -T terraform terraform init -upgrade -input=false

      - name: Terraform Apply
        run: |
          docker compose exec -T terraform terraform apply -auto-approve \
            -var="image_tag=${{ steps.vars.outputs.IMAGE_TAG }}" \
            -var="local_registry=local-registry:5000"

      # ── 8. Force ECS redeploy trên LocalStack ────────────────────────────
      - name: Force ECS redeploy
        run: |
          aws --endpoint-url="$LOCALSTACK_ENDPOINT" ecs update-service \
            --cluster demo-cluster \
            --service my-app-service \
            --force-new-deployment \
            --region "$AWS_REGION"

      # ── 9. Smoke test – chạy container thực để verify image hoạt động ────
      # (LocalStack CE không run container thật nên kiểm tra trực tiếp)
      - name: Smoke test app
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}"
          echo "Running smoke test for $IMAGE ..."
          # host.docker.internal: để container reach LocalStack trên Docker host (macOS)
          docker run -d --name smoke-test -p 3001:3000 \
            -e LOCALSTACK_ENDPOINT="http://host.docker.internal:4566" \
            -e IMAGE_TAG="${{ steps.vars.outputs.IMAGE_TAG }}" \
            "$IMAGE"
          sleep 3
          RESPONSE=$(curl -sf --retry 5 --retry-delay 1 http://localhost:3001)
          echo "App response: $RESPONSE"
          if [ -z "$RESPONSE" ]; then
            echo "❌ Smoke test FAILED – empty response"
            docker stop smoke-test || true
            exit 1
          fi
          # Gửi thêm requests để tạo nhiều CloudWatch log events
          echo "Generating additional log events..."
          for i in 1 2 3 4 5; do
            curl -sf "http://localhost:3001/health?req=$i" > /dev/null
            echo "  → request $i sent"
          done
          curl -sf "http://localhost:3001/api/status" > /dev/null
          curl -sf "http://localhost:3001/api/version" > /dev/null
          # Chờ app flush logs lên CloudWatch trước khi stop
          sleep 3
          docker stop smoke-test || true
          echo "✅ Smoke test PASSED"

      # ── 10. Show CloudWatch Logs ──────────────────────────────────────────
      - name: Show CloudWatch Logs
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║           CloudWatch Logs – LocalStack Demo              ║"
          echo "╚══════════════════════════════════════════════════════════╝"

          echo ""
          echo "── Log Groups ──────────────────────────────────────────────"
          aws --endpoint-url="$LOCALSTACK_ENDPOINT" logs describe-log-groups \
            --log-group-name-prefix "/ecs/my-app" \
            --query 'logGroups[*].{Group:logGroupName,RetentionDays:retentionInDays,StoredBytes:storedBytes}' \
            --output table

          echo ""
          echo "── Log Streams ─────────────────────────────────────────────"
          aws --endpoint-url="$LOCALSTACK_ENDPOINT" logs describe-log-streams \
            --log-group-name "/ecs/my-app" \
            --order-by LastEventTime \
            --descending \
            --query 'logStreams[*].{Stream:logStreamName,FirstEvent:firstEventTimestamp,LastEvent:lastEventTimestamp,Events:storedBytes}' \
            --output table

          STREAM=$(aws --endpoint-url="$LOCALSTACK_ENDPOINT" logs describe-log-streams \
            --log-group-name "/ecs/my-app" \
            --order-by LastEventTime \
            --descending \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null)

          echo ""
          echo "── Log Events from: $STREAM ────────────────────────────────"
          aws --endpoint-url="$LOCALSTACK_ENDPOINT" logs get-log-events \
            --log-group-name "/ecs/my-app" \
            --log-stream-name "$STREAM" \
            --query 'events[*].message' \
            --output text 2>/dev/null \
          | tr '\t' '\n' \
          | while IFS= read -r line; do
              # Parse JSON để hiện thị đẹp hơn
              TIME=$(echo "$line" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d.get('time',''))" 2>/dev/null || echo "")
              LEVEL=$(echo "$line" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d.get('level',''))" 2>/dev/null || echo "")
              CAT=$(echo "$line" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d.get('cat',''))" 2>/dev/null || echo "")
              MSG=$(echo "$line" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d.get('msg',''))" 2>/dev/null || echo "$line")
              printf "  [%-5s] %-8s %s  %s\n" "$LEVEL" "$CAT" "$TIME" "$MSG"
            done

          echo ""
          echo "Total log events in stream:"
          aws --endpoint-url="$LOCALSTACK_ENDPOINT" logs get-log-events \
            --log-group-name "/ecs/my-app" \
            --log-stream-name "$STREAM" \
            --query 'length(events)' \
            --output text 2>/dev/null
          echo ""
          echo "✅ CloudWatch Logs demo complete!"

      # ── 11. Verify LocalStack ECS state ───────────────────────────────────
      - name: Verify deployment
        run: |
          echo "✅ Deployed image: $ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}"
          echo ""
          echo "── Registry tags ──"
          curl -s "http://localhost:5000/v2/$ECR_REPOSITORY/tags/list"
          echo ""
          echo ""
          echo "── ECS service status ──"
          aws --endpoint-url="$LOCALSTACK_ENDPOINT" ecs describe-services \
            --cluster demo-cluster \
            --services my-app-service \
            --region "$AWS_REGION" \
            --query 'services[0].{Status:status,Desired:desiredCount,Running:runningCount,TaskDefinition:taskDefinition}' \
            --output table

      # ── 12. Cleanup old Docker images ─────────────────────────────────────
      - name: Cleanup old Docker images
        if: always()
        run: |
          docker stop smoke-test 2>/dev/null || true
          # Xoá dangling images (không có tag)
          docker image prune -f
          # Giữ lại 3 tag mới nhất, xoá các image cũ hơn
          docker images "$ECR_REGISTRY/$ECR_REPOSITORY" --format "{{.Tag}}" \
            | sort -r | tail -n +4 \
            | xargs -I{} docker rmi "$ECR_REGISTRY/$ECR_REPOSITORY:{}" 2>/dev/null || true
          echo "✅ Cleanup done"
