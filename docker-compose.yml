services:
  localstack:
    container_name: localstack
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - SERVICES=ecr,ecs,iam,sts,ec2,cloudwatch,logs
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./volume:/var/lib/localstack"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - infra-net

  # Terraform workspace – dùng để chạy tay qua docker compose exec
  terraform:
    container_name: tf_workspace
    image: hashicorp/terraform:latest
    entrypoint: /bin/sh
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ./terraform:/workspace
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      # Trỏ endpoint về localstack (nội bộ docker network)
      - TF_VAR_localstack_endpoint=http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - infra-net

  # Local Docker Registry – thay thế ECR (LocalStack CE không lưu image)
  registry:
    image: registry:2
    container_name: local-registry
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    networks:
      - infra-net

  # App – dùng để build image local / smoke test
  app:
    build:
      context: ./app
    container_name: my-app
    ports:
      - "3000:3000"
    networks:
      - infra-net

networks:
  infra-net:
    driver: bridge

